name: Deploy VitePress to GitHub Pages

on:
  push:
    branches:
      - main  # 默认分支，可以修改为你自己的分支名

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Setup Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'  # 使用 Node 18，与你的项目 Node 版本一致

    # Install dependencies
    - name: Install dependencies
      run: npm ci  # 这会安装 package-lock.json 中的依赖

    # Build the project
    - name: Build the site
      run: npm run build  # 构建 VitePress 网站

    # Deploy the build to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        publish_dir: './docs/.vitepress/dist'  # VitePress 默认的构建目录
        github_token: ${{ secrets.GITHUB_TOKEN }}  # 自动获取 GitHub token 进行部署
        destination_dir: ''  # 将构建文件部署到根目录
